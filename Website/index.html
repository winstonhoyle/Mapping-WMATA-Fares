<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>JS Bin</title>
  <script src="https://code.jquery.com/jquery-2.1.0.min.js"></script>
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.4/dist/leaflet.css"
   integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA=="
   crossorigin=""/>
   <script src="https://unpkg.com/leaflet@1.3.4/dist/leaflet.js"
   integrity="sha512-nMMmRyTVoLYqjP9hrbed9S+FzjZHW5gY1TWCHA5ckwXZBadntCNs8kEqAWdrb9O7rxbCaA4lKTIWjDXZxflOcA=="
   crossorigin=""></script>
</head>
  <style>
    #mapid {
      position: relative;
      height: 800px;
      width:800px;
    }
  </style>
<body>
  <div id="mapid">
    <script>
      var map = L.map('mapid');
      L.tileLayer('http://{s}.tiles.wmflabs.org/bw-mapnik/{z}/{x}/{y}.png').addTo(map);
      var station_url = "https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/geojson/Metro_Stations.geojson";
      var line_url = "https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/geojson/Metro_Lines.geojson";
      
      
      var stationjson = {};
      var linejson = {};
      var farejson = {};
      
      $.ajax({
        url:station_url,
        async:false,
        dataType:'json',
        success: function(data){
          stationjson = data;
        }
      });
      
      $.ajax({
        url:line_url,
        async:false,
        dataType:'json',
        success: function(data){
          linejson = data;
        }
      });
    
      
      $.ajax({
        url:"https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/all_stations.json",
        async: false,
        dataType: 'json',
        success: function(data) {
          farejson = data;
        }
      });
      
      var stations = L.geoJson(stationjson, {
        pointToLayer: function(feature, latlng) {
          return L.circleMarker(latlng, {
            radius: 5,
            color: "#000000",
            fillColor: "#ffffff",
            fillOpacity: 1.0
          }).bindTooltip(feature.properties.STAT_NAME);
        }
      });
      
      var lines = L.geoJson(linejson, {
        style: function(features) {
          return {
            weight: 4,
            color: features.properties.NAME
          };
        }
      });
      
      stations.addTo(map);
      lines.addTo(map);
      
      stations.bringToFront();
      lines.bringToBack();
      
      map.fitBounds(lines.getBounds());
      
      function OnlyStations(color){
        stationList = []
        var stationsNum = 0;
        var count = stationjson.features.length;
        for (var i=0; i < count; i++){
          stationColor = stationjson.features[i].properties.MetroLine.split(",").map(function(item) {
            return item.trim();
          });
          if (stationColor.includes(String(color))){
            stationsNum++;
            stationList.push(stationjson.features[i].properties.STAT_NAME);
          }
        }
        console.log(String(color) + ": " + String(stationsNum));
        return stationList;
      }
      
      var redStations=OnlyStations("red");
      
    </script>
    <script src="./picklines.js">
    </script>
  </div>
  <button onclick="Red();">Red</button>
  <button onclick="Orange();">Orange</button>
  <button onclick="Silver();">Silver</button>
  <button onclick="Yellow();">Yellow</button>
  <button onclick="Blue();">Blue</button>
  <button onclick="Green();">Green</button>
</body>
</html>
