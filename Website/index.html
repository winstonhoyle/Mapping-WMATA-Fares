<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>JS Bin</title>
  <script src="https://code.jquery.com/jquery-2.1.0.min.js"></script>
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.4/dist/leaflet.css"
   integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA=="
   crossorigin=""/>
   <script src="https://unpkg.com/leaflet@1.3.4/dist/leaflet.js"
   integrity="sha512-nMMmRyTVoLYqjP9hrbed9S+FzjZHW5gY1TWCHA5ckwXZBadntCNs8kEqAWdrb9O7rxbCaA4lKTIWjDXZxflOcA=="
   crossorigin=""></script>
</head>
  <style>
    #mapid {
      position: relative;
      height:600px;
      width:1200px;
      left: 100px;
    }
  </style>
<body>
  <div id="mapid">
    <script>
      var map = L.map('mapid');
      L.tileLayer('http://{s}.tiles.wmflabs.org/bw-mapnik/{z}/{x}/{y}.png').addTo(map);
      var station_url = "https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/geojson/Metro_Stations.geojson";
      var line_url = "https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/geojson/Metro_Lines.geojson";
      
      
      var stationjson = {};
      var linejson = {};
      
      $.ajax({
        url:station_url,
        async:false,
        dataType:'json',
        success: function(data){
          stationjson = data;
          console.log("stations loaded");
        }
      });
      
      $.ajax({
        url:line_url,
        async:false,
        dataType:'json',
        success: function(data){
          linejson = data;
          console.log("lines loaded");
        }
      });
      
      var stations = L.geoJson(stationjson, {
        pointToLayer: function(feature, latlng) {
          return L.circleMarker(latlng, {
            radius: 5,
            color: "black",
            fillColor: "#00000"
          }).bindTooltip(feature.properties.STAT_NAME);
        }
      });
      
      var lines = L.geoJson(linejson, {
        style: function(features) {
          return {
            weight: 4,
            color: features.properties.NAME
          };
        }
      });
      stations.addTo(map);
      lines.addTo(map);
      
      map.fitBounds(lines.getBounds());
      
      red = false;
      function Red() {
        if (!red) {
          map.removeLayer(lines);
          redline = L.geoJson(linejson, {
            style: function(feature) {
              return { color: feature.properties.NAME};
            },
            filter: function(feature) {
              if (feature.properties.NAME === "red") return true;
            }
          });
          redline.addTo(map);
          map.fitBounds(redline.getBounds());
          red = true;
        } else {
          map.removeLayer(redline);
          map.addLayer(lines);
          map.fitBounds(lines.getBounds());
          red = false;
        }
      }
      
      
      /*
      function removeAllLayers() {
        map.eachLayer(function() {
          if (map.hasLayer(redline)) {
            map.removeLayer(redline);
          } else if (map.hasLayer(orangeline)) {
            map.removeLayer(orangeline);
          } else if (map.hasLayer(silverline)) {
            map.removeLayer(silverlive);
          } else if (map.hasLayer(yellowline)) {
            map.removeLayer(yellowline);
          } else if (map.hasLayer(blueline)) {
            map.removeLayer(blueline);
          } else if (map.hasLayer(greenline)) {
            map.removeLayer(greenline);
          } else {
            console.log("no layers");
          }
        });
      }
    
    */
     
      orange = false;
      function Orange() {
        if (!orange) {
          map.removeLayer(lines);
          orangeline = L.geoJson(linejson, {
            style: function(feature) {
              return { color: feature.properties.NAME };
            },
            filter: function(feature) {
              if (feature.properties.NAME === "orange") return true;
            }
          });
          orangeline.addTo(map);
          map.fitBounds(orangeline.getBounds());
          orange = true;
        } else {
          map.removeLayer(orangeline);
          map.addLayer(lines);
          map.fitBounds(lines.getBounds());
          orange = false;
        }
      }
      
    </script>
  </div>
  <button onclick="Red();">Red</button>
  <button onclick="Orange();">Orange</button>
  <button onclick="Silver();">Silver</button>
  <button onclick="Yellow();">Yellow</button>
  <button onclick="Blue();">Blue</button>
  <button onclick="Green();">Green</button>
</body>
</html>
