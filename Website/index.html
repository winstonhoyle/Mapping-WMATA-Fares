<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>JS Bin</title>
  <script src="https://code.jquery.com/jquery-2.1.0.min.js"></script>
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.4/dist/leaflet.css"
   integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA=="
   crossorigin=""/>
   <script src="https://unpkg.com/leaflet@1.3.4/dist/leaflet.js"
   integrity="sha512-nMMmRyTVoLYqjP9hrbed9S+FzjZHW5gY1TWCHA5ckwXZBadntCNs8kEqAWdrb9O7rxbCaA4lKTIWjDXZxflOcA=="
   crossorigin=""></script>
</head>
  <style>
    #mapid {
      height:600px;
      width:1200px;
    }
  </style>
<body>
  <div id="mapid">
    <script>
      var map = L.map('mapid').setView([51.505, -0.09], 13);
      var basemap = L.tileLayer('http://{s}.tiles.wmflabs.org/bw-mapnik/{z}/{x}/{y}.png').addTo(map);
      var station_url = "https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/geojson/Metro_Stations.geojson";
      var line_url = "https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/geojson/Metro_Lines.geojson"
      
      $.getJSON(station_url, function(response){
        stations = new L.GeoJSON(response);
        stations.addTo(map);
        map.fitBounds(stations.getBounds());
      })
      
      $.getJSON(line_url, function(response){
        stations = new L.GeoJSON(response, {
          onEachFeature:
            function(feature,layer) {
              console.log(feature)
              layer.bindPopup(feature.properties.NAME)
            },
          style: function(feature){
            return {color: feature.properties.NAME, weight: 10}
          }
        }).addTo(map);
      });
      
    </script>
  </div>
</body>
</html>
