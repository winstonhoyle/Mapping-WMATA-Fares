<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>JS Bin</title>
  <script src="https://code.jquery.com/jquery-2.1.0.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.4.0/dist/leaflet.css"
  integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA=="
  crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"
  integrity="sha512-QVftwZFqvtRNi0ZyCtsznlKSWOStnDORoefr1enyq5mVL4tmKB3S/EnC3rRJcxCPavG10IcrVGSmPh6Qw5lwrg=="
  crossorigin=""></script>
</head>
  <style>
    #mapid {
      position: relative;
      height: 800px;
      width:800px;
    }
  </style>
<body>
  <div id="mapid">
    <script>
      //add basemap
      var map = L.map('mapid');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href=http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);
      //geojson files
      var station_url = "https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/geojson/Metro_Stations.geojson";
      var line_url = "https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/geojson/Metro_Lines.geojson";
      var fare_url = "https://raw.githubusercontent.com/winstonhoyle/Mapping-WMATA-Fares/master/Data/all_stations.json";
      
      //formatting into json objects
      var stationjson = {};
      var linejson = {};
      var farejson = {};
      
      //getting station information
      $.ajax({
        url:station_url,
        async:false,
        dataType:'json',
        success: function(data){
          stationjson = data;
        }
      });
      
      //getting line infomation
      $.ajax({
        url:line_url,
        async:false,
        dataType:'json',
        success: function(data){
          linejson = data;
        }
      });
    
      //getting fare information
      $.ajax({
        url: fare_url,
        async: false,
        dataType: 'json',
        success: function(data) {
          farejson = data;
        }
      });
      
      function highlightFeature(e) {
        var target = e.target;
        if (dept) {
          stations.eachLayer(function(layer) {
          layer.setStyle({
            fillColor: getColor(GetFares(layer.feature.properties.STAT_NAME, target.feature.properties.STAT_NAME)),
            radius: 8
          });
        });
          dept = false;
        } else {
          stations.setStyle({
            radius: 5,
            color: "#000000",
            fillColor: "#ffffff",
            fillOpacity: 1.0
          });
          dept = true;
        }
        
      }
      
      function onEachFeature(feature, layer) {
        layer.on({
          click: highlightFeature
        });
      }
      
      function getColor(d) {
        return d > 1000 ? '#800026' :
          d > 7.0  ? '#BD0026' :
          d > 6.0  ? '#E31A1C' :
          d > 5.0  ? '#FC4E2A' :
          d > 4.0  ? '#FD8D3C' :
          d > 3.0  ? '#FEB24C' :
          d > 2.0  ? '#FED976' :
                   '#FFEDA0';
      }
      
      var dept = true;
      //creating stations layer
      var stations = L.geoJson(stationjson, {
        pointToLayer: function(feature, latlng) {
          return L.circleMarker(latlng, {
            radius: 5,
            color: "#000000",
            fillColor: "#ffffff",
            fillOpacity: 1.0
          }).bindTooltip(feature.properties.STAT_NAME);
        },
        onEachFeature: onEachFeature
      });
      
      
      //TODO
      //INTEGRATE THIS WITH PICKLINES.JS AND UPDATE LINES
      function selection(feature,layer){
        layer.on('click', function() {
          this.setStyle({
            'color': this.feature.properties.NAME,
            'weight': 10
          });
          map.fitBounds(layer.getBounds());
        });
        layer.off('click', function(){
          this.setStyle({
            'color': this.feature.properties.NAME,
            'weight': 6
          });
          map.fitBounds(lines.getBounds());
        });
        
            
        
      }
      
      //creating lines layer
      var lines = L.geoJson(linejson, {
        style: function(features) {
          return {
            weight: 6,
            color: features.properties.NAME
          };
        },
        onEachFeature: function(feature,layer){
          selection(feature, layer);
        }
      });
      
      //adding stations and lines to map
      stations.addTo(map);
      lines.addTo(map);
      lines.bringToBack();
      map.fitBounds(stations.getBounds());
      
      function GetFares(dept,arr){
        peakfare = farejson[dept][arr].fares.peak;
        var fare = parseFloat(peakfare);
        return fare;
      }
      
    </script>
    <script src="../static/picklines.js">
    </script>
  </div>
  <input type="button" onclick="Red()" value="Red" id="redButton">
  <input type="button" onclick="Orange()" value="Orange" id="orangeButton"/>
  <input type="button" onclick="Silver()" value="Silver" id="silverButton"/>
  <input type="button" onclick="Yellow()" value="Yellow" id="yellowButton"/>
  <input type="button" onclick="Blue()" value="Blue" id="blueButton"/>
  <input type="button" onclick="Green()" value="Green" id="greenButton"/>
</body>
</html>
